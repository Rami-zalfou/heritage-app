<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Local Knowledge 2026</title>

    <!-- Leaflet & Esri Scripts -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; background: #ccd; }
        
        .overlay {
            position: absolute; bottom: 30px; left: 0; right: 0;
            z-index: 1000; text-align: center; pointer-events: none;
        }
        button {
            padding: 15px 30px; background: #e63946; color: white; border: none;
            border-radius: 50px; font-weight: bold; cursor: pointer; pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 16px;
        }
        #status-pill {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255, 255, 255, 0.9); padding: 5px 15px;
            border-radius: 20px; font-size: 12px; border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <div id="status-pill">Map Ready</div>
    
    <div class="overlay">
        <button onclick="startApp()">FIND HISTORIC BUILDINGS</button>
    </div>

    <div id="map"></div>

    <script>
        // 1. Setup Map
        const map = L.map('map', { zoomControl: false }).setView([51.5, -0.1], 10);
        const status = document.getElementById('status-pill');

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 2. Updated 2026 Data Layer (National Heritage List v02)
        const heritageLayer = L.esri.featureLayer({
            url: 'https://services-eu1.arcgis.com/ZOdPfBS3aqqDYPUQ/arcgis/rest/services/National_Heritage_List_for_England_NHLE_v02_VIEW/FeatureServer/0',
            where: "1=1",
            pointToLayer: function (geojson, latlng) {
                return L.circleMarker(latlng, {
                    radius: 7, fillColor: "#e63946", color: "#fff", weight: 1, opacity: 1, fillOpacity: 0.9
                });
            }
        }).addTo(map);
