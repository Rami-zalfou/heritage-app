<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Local Knowledge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Leaflet & Esri Scripts -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; background: #eee; }
        .ui-overlay {
            position: absolute; bottom: 20px; left: 10px; right: 10px; z-index: 1000;
            text-align: center; pointer-events: none;
        }
        button {
            padding: 15px 25px; background: #d90429; color: white; border: none;
            border-radius: 50px; font-weight: bold; cursor: pointer; pointer-events: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 16px;
        }
        #status {
            background: rgba(255,255,255,0.9); padding: 5px 15px; border-radius: 15px;
            font-size: 12px; margin-bottom: 10px; display: inline-block;
        }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <div id="status">Ready</div><br>
        <button onclick="startApp()">SEARCH NEAR ME</button>
    </div>
    <div id="map"></div>

    <script>
        // 1. Setup the Map
        const map = L.map('map', { zoomControl: false }).setView([52.5, -1.5], 6);
        const status = document.getElementById('status');

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 2. The Data Layer (Direct Connection)
        // This is the official Historic England Feature Service URL
        const heritageLayer = L.esri.featureLayer({
            url: 'https://services.arcgis.com/JJHeAs9z9rlXtk8v/arcgis/rest/services/National_Heritage_List_for_England_NHLE_v02_VIEW/FeatureServer/0',
            where: "1=1",
            pointToLayer: function (geojson, latlng) {
                return L.circleMarker(latlng, {
                    radius: 6, fillColor: "#ef233c", color: "#fff", weight: 1, opacity: 1, fillOpacity: 0.9
                });
            }
        }).addTo(map);

        // Feedback events
        heritageLayer.on('loading', () => status.innerText = "Downloading buildings...");
        heritageLayer.on('load', () => status.innerText = "Done! Zoom in to see dots.");

        heritageLayer.bindPopup(function (layer) {
            const p = layer.feature.properties;
            return `<b>${p.Name}</b><br>Grade: ${p.Grade}<br><a href="https://historicengland.org.uk/listing/the-list/list-entry/${p.ListEntry}" target="_blank">Full Record</a>`;
        });

        // 3. The Function to Start
        function startApp() {
            status.innerText = "Locating you...";
            map.locate({setView: true, maxZoom: 16});
        }

        map.on('locationfound', function(e) {
            L.marker(e.latlng).addTo(map).bindPopup("You are here").openPopup();
            status.innerText = "Location found. Fetching data...";
        });

        map.on('locationerror', function() {
            status.innerText = "GPS Error. Check phone settings.";
            // Fallback to a place with lots of data to prove it works
            map.setView([51.501, -0.124], 15);
        });

    </script>
</body>
</html>
